<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expo Go — QR код</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e1a;
      color: #fff;
      padding: 24px;
    }
    h1 { font-size: 20px; margin-bottom: 8px; font-weight: 600; }
    p { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 24px; text-align: center; }
    img { 
      width: 240px; 
      height: 240px; 
      background: #fff; 
      padding: 16px; 
      border-radius: 16px;
      margin-bottom: 16px;
    }
    code { 
      font-size: 12px; 
      background: rgba(255,255,255,0.1); 
      padding: 8px 12px; 
      border-radius: 8px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Expo Go</h1>
  <p>Отсканируйте QR-код камерой телефона<br>или введите URL в Expo Go</p>
  <img id="qr" src="" alt="QR код">
  <code id="url"></code>
  <script>
    // Update host to your Mac's LAN IP (see EXPO_PUBLIC_API_URL in .env for API)
    const host = '192.168.31.59';
    const expUrl = 'exp://' + host + ':8081';
    document.getElementById('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=' + encodeURIComponent(expUrl);
    document.getElementById('url').textContent = expUrl;
  </script>
</body>
</html>
